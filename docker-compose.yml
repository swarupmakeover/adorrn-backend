services:
  postgres:
    image: postgres:16-alpine
    container_name: adorrn-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: adorrn
      POSTGRES_PASSWORD: adorrn_dev
      POSTGRES_DB: adorrn_herbal
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql

volumes:
  pgdata:
